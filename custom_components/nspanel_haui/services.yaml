# ── nspanel_haui.open_panel ──────────────────────────────────
open_panel:
  name: Open panel
  description: >-
    Navigate the display to the specified panel.  The panel
    is opened through the navigation controller so the full
    render pipeline runs (goto_page, page ack, settle, set_panel).
    Navigation history, popups, and lock state are honored.

    If wakeup is enabled (default false), the display is woken
    before opening the panel — equivalent to calling
    reset_last_interaction first.
  fields:
    device:
      name: "Device"
      description: "Target NSPanel device. If omitted, applies to all devices."
      required: false
      selector:
        device:
          integration: nspanel_haui
    panel:
      name: "Panel key"
      description: >-
        Panel key to open (e.g. "grid_0", "light_0", "home").
      required: true
      example: "alarm"
      selector:
        text:
          type: text
    wakeup:
      name: "Wake up"
      description: "Wake the display before opening the panel."
      required: false
      default: false
      selector:
        boolean:

# ── nspanel_haui.close_panel ─────────────────────────────────
close_panel:
  name: Close panel
  description: >-
    Close the current panel and return to the previous panel
    (or home panel if there is no history).
  fields:
    device:
      name: "Device"
      description: "Target NSPanel device. If omitted, applies to all devices."
      required: false
      selector:
        device:
          integration: nspanel_haui

# ── nspanel_haui.wakeup ──────────────────────────────────────
wakeup:
  name: Wake up
  description: >-
    Wake the display and navigate to the configured wakeup
    panel (or home panel if no wakeup panel is set).
  fields:
    device:
      name: "Device"
      description: "Target NSPanel device. If omitted, applies to all devices."
      required: false
      selector:
        device:
          integration: nspanel_haui

# ── nspanel_haui.sleep ───────────────────────────────────────
sleep:
  name: Sleep
  description: >-
    Send the display to sleep by opening the configured sleep
    panel.  The display will wake on touch or via the ``wakeup``
    service.
  fields:
    device:
      name: "Device"
      description: "Target NSPanel device. If omitted, applies to all devices."
      required: false
      selector:
        device:
          integration: nspanel_haui

# ── nspanel_haui.send_notification ───────────────────────────
send_notification:
  name: Send notification
  description: >-
    Show a notification on the panel with a title, message and icon.
    Optionally auto-dismiss after a timeout, or make it persistent so
    it must be dismissed on the panel to stop the alert sound.
  fields:
    device:
      name: "Device"
      description: "Target NSPanel device. If omitted, applies to all devices."
      required: false
      selector:
        device:
          integration: nspanel_haui
    title:
      name: "Title"
      description: "Notification headline shown at the top of the panel."
      required: true
      example: "Doorbell"
      selector:
        text:
          type: text
    message:
      name: "Message"
      description: "Body text of the notification. Can be left empty for a title-only alert."
      required: false
      example: "Someone is at the front door"
      selector:
        text:
          type: text
          multiline: true
    icon:
      name: "Icon"
      description: "Material Design Icon (e.g. \"mdi:bell\") shown next to the title."
      required: false
      example: "mdi:bell"
      selector:
        icon:
    type:
      name: "Severity"
      description: "Severity level that affects the alert colour and sound."
      required: false
      default: "info"
      selector:
        select:
          options:
            - "info"
            - "warning"
            - "critical"
    timeout:
      name: "Timeout"
      description: >-
        Seconds until the notification auto-dismisses.  0 (default)
        keeps it on screen until dismissed.
      required: false
      default: 0
      example: 10
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: "s"
          mode: box
    persistent:
      name: "Persistent"
      description: >-
        When on, the notification must be dismissed on the panel to
        stop the alert sound (loops until dismissed).
      required: false
      default: false
      selector:
        boolean:
    force_show:
      name: "Force show"
      description: >-
        When on, immediately opens the notification panel even if
        another panel is currently displayed.
      required: false
      default: false
      selector:
        boolean:

# ── nspanel_haui.reset_last_interaction ──────────────────────
reset_last_interaction:
  name: Reset last interaction
  description: >-
    Reset the panel's idle timer as if the user just touched it —
    keeps the display awake or delays sleep.  Optionally add an
    offset (in seconds) to the reset point.
  fields:
    device:
      name: "Device"
      description: "Target NSPanel device. If omitted, applies to all devices."
      required: false
      selector:
        device:
          integration: nspanel_haui
    offset:
      name: "Offset"
      description: "Additional seconds of wake time before the display returns to idle."
      required: false
      default: 0
      example: 0
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: "s"
          mode: box