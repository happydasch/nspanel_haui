# ── nspanel_haui.open_panel ──────────────────────────────────
open_panel:
  name: Open panel
  description: >-
    Navigate the display to the specified panel.  The panel
    is opened through the navigation controller so the full
    render pipeline runs (goto_page, page ack, settle, set_panel).
    Navigation history, popups, and lock state are honored.

    If wakeup is enabled (default false), the display is woken
    before opening the panel — equivalent to calling
    reset_last_interaction first.
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: nspanel_haui
    panel:
      required: true
      example: "alarm"
      selector:
        text:
          type: text
    wakeup:
      required: false
      default: false
      selector:
        boolean:

# ── nspanel_haui.close_panel ─────────────────────────────────
close_panel:
  name: Close panel
  description: >-
    Close the current panel and return to the previous panel
    (or home panel if there is no history).
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: nspanel_haui

# ── nspanel_haui.wakeup ──────────────────────────────────────
wakeup:
  name: Wake up
  description: >-
    Wake the display and navigate to the configured wakeup
    panel (or home panel if no wakeup panel is set).
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: nspanel_haui

# ── nspanel_haui.set_brightness ──────────────────────────────
set_brightness:
  name: Set brightness
  description: >-
    Set the display backlight brightness.  Values range from 0
    (off) to 100 (maximum).
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: nspanel_haui
    intensity:
      required: true
      example: 75
      selector:
        number:
          min: 0
          max: 100
          unit_of_measurement: "%"

# ── nspanel_haui.send_command ────────────────────────────────
send_command:
  name: Send command
  description: >-
    Send a raw Nextion display command to the device.  For advanced
    users and debugging only.
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: nspanel_haui
    cmd:
      required: true
      example: "page 0"
      selector:
        text:
          type: text

# ── nspanel_haui.goto_page ───────────────────────────────────
goto_page:
  name: Go to page
  description: >-
    Switch the display to a Nextion page by its numeric page ID.
    This is a low-level operation that bypasses the navigation
    pipeline — prefer ``open_panel`` for normal use.
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: nspanel_haui
    page:
      required: true
      example: 0
      selector:
        number:
          min: 0
          max: 50
# ── nspanel_haui.sleep ───────────────────────────────────────
sleep:
  name: Sleep
  description: >-
    Send the display to sleep by opening the configured sleep
    panel.
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: nspanel_haui

# ── nspanel_haui.send_notification ───────────────────────────
send_notification:
  name: Send notification
  description: >-
    Show a notification on the panel with a title, message and icon.
    Optionally auto-dismiss after a timeout, or make it persistent so
    it must be dismissed on the panel to stop the alert sound.
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: nspanel_haui
    title:
      required: true
      example: "Doorbell"
      selector:
        text:
          type: text
    message:
      required: false
      example: "Someone is at the front door"
      selector:
        text:
          type: text
          multiline: true
    icon:
      required: false
      example: "mdi:bell"
      selector:
        icon:
    timeout:
      required: false
      default: 0
      example: 10
      description: >-
        Seconds until the notification auto-dismisses.  0 (default)
        keeps it on screen until dismissed.
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: "s"
          mode: box
    persistent:
      required: false
      default: false
      description: >-
        When on, the notification must be dismissed on the panel to
        stop the alert sound.
      selector:
        boolean:

# ── nspanel_haui.play_rtttl ──────────────────────────────────
play_rtttl:
  name: Play RTTTL tune
  description: >-
    Play a ringtone on the panel buzzer from an RTTTL string.
    See https://picaxe.com/rtttl-ringtones-for-tune-command/
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: nspanel_haui
    song_str:
      required: true
      example: "Beep:d=4,o=5,b=100:16e6"
      selector:
        text:
          type: text

# ── nspanel_haui.play_sound ──────────────────────────────────
play_sound:
  name: Play sound
  description: >-
    Play a named built-in sound on the panel buzzer.
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: nspanel_haui
    name:
      required: true
      example: "notification"
      selector:
        text:
          type: text

# ── nspanel_haui.reset_last_interaction ──────────────────────
reset_last_interaction:
  name: Reset last interaction
  description: >-
    Reset the panel's idle timer as if the user just touched it —
    keeps the display awake or delays sleep.  Optionally add an
    offset (in seconds) to the reset point.
  fields:
    device_id:
      required: true
      selector:
        device:
          integration: nspanel_haui
    offset:
      required: false
      default: 0
      example: 0
      selector:
        number:
          min: 0
          max: 3600
          unit_of_measurement: "s"
          mode: box