  <rect x="34" y="104" width="20" height="12" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="60" y="104" width="20" height="12" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="86" y="104" width="20" height="12" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="112" y="104" width="20" height="12" rx="2" fill="rgba(255,255,255,0.06)"/>
  <rect x="138" y="104" width="20" height="12" rx="2" fill="rgba(255,255,255,0.06)"/>
</svg>
