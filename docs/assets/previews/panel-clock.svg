  <!-- Weather top-left -->
  <text x="8" y="10" fill="#3b82f6" font-family="sans-serif" font-size="7" font-weight="bold">24°</text>
  <text x="8" y="18" fill="#888" font-family="sans-serif" font-size="5">1023hPa</text>
