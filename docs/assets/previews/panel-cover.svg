<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" width="160" height="120">
  <rect x="0" y="0" width="160" height="120" rx="8" ry="8" fill="#000"/>
  <!-- Up / Stop / Down button tiles -->
  <rect x="50" y="22" width="30" height="18" rx="4" fill="rgba(255,255,255,0.06)"/>
  <polygon points="65,26 58,35 72,35" fill="#ccc"/>
  <rect x="50" y="44" width="30" height="18" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="60" y="49" width="10" height="8" rx="1.5" fill="#3b82f6" opacity="0.8"/>
  <rect x="50" y="66" width="30" height="18" rx="4" fill="rgba(255,255,255,0.06)"/>
  <polygon points="65,80 58,71 72,71" fill="#ccc"/>
  <!-- Vertical position slider -->
  <rect x="90" y="10" width="20" height="76" rx="4" fill="#222"/>
  <rect x="90" y="10" width="20" height="42" rx="4" fill="#3b82f6" opacity="0.6"/>
