<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" width="160" height="120">
  <rect x="0" y="0" width="160" height="120" rx="8" ry="8" fill="#000"/>
  <!-- 4 mode buttons stacked on left -->
  <rect x="10" y="10" width="28" height="16" rx="4" fill="#3b82f6" opacity="0.3"/>
  <rect x="10" y="30" width="28" height="16" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="10" y="50" width="28" height="16" rx="4" fill="rgba(255,255,255,0.06)"/>
  <rect x="10" y="70" width="28" height="16" rx="4" fill="rgba(255,255,255,0.06)"/>
  <text x="24" y="21" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="5">Bright</text>
  <text x="24" y="41" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="5">Temp</text>
  <text x="24" y="61" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="5">Color</text>
  <text x="24" y="81" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="5">Fx</text>
  <!-- Brightness slider centered horizontally -->
  <rect x="70" y="10" width="20" height="76" rx="4" fill="#222"/>
  <rect x="70" y="10" width="20" height="42" rx="4" fill="#3b82f6" opacity="0.6"/>
  <rect x="66" y="48" width="28" height="8" rx="4" fill="#fff"/>
  <!-- Info -->
  <text x="80" y="106" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="6">65% brightness</text>
</svg>
