<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" width="160" height="120">
  <rect x="0" y="0" width="160" height="120" rx="8" ry="8" fill="#000"/>
  <!-- Album art + track info -->
  <rect x="8" y="8" width="24" height="24" rx="3" fill="#333"/>
  <circle cx="20" cy="16" r="5" fill="#3b82f6" opacity="0.4"/>
  <text x="36" y="16" fill="#ddd" font-family="sans-serif" font-size="7" font-weight="bold">Bohemian Rhapsody</text>
  <text x="36" y="26" fill="#888" font-family="sans-serif" font-size="6">Queen</text>
  <!-- Progress bar -->
  <rect x="8" y="38" width="144" height="3" rx="1.5" fill="#222"/>
  <rect x="8" y="38" width="80" height="3" rx="1.5" fill="#3b82f6" opacity="0.7"/>
  <!-- 5 playback buttons -->
  <rect x="20" y="50" width="16" height="16" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="44" y="50" width="16" height="16" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="70" y="48" width="20" height="20" rx="5" fill="#3b82f6" opacity="0.6"/>
  <rect x="98" y="50" width="16" height="16" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="122" y="50" width="16" height="16" rx="3" fill="rgba(255,255,255,0.06)"/>
  <polygon points="78,52 78,64 86,58" fill="#fff"/>
  <!-- Volume slider -->
  <rect x="28" y="74" width="112" height="4" rx="2" fill="#222"/>
  <rect x="28" y="74" width="64" height="4" rx="2" fill="#3b82f6" opacity="0.5"/>
  <text x="10" y="78" fill="#888" font-family="sans-serif" font-size="5">Vol</text>
  <!-- 3 source selectors -->
  <rect x="8" y="88" width="44" height="18" rx="3" fill="rgba(255,255,255,0.05)"/>
  <rect x="58" y="88" width="44" height="18" rx="3" fill="rgba(255,255,255,0.05)"/>
  <rect x="108" y="88" width="44" height="18" rx="3" fill="rgba(255,255,255,0.05)"/>
  <text x="30" y="99" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="5">Source</text>
  <text x="80" y="99" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="5">Playlist</text>
  <text x="130" y="99" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="5">Tracks</text>
</svg>
