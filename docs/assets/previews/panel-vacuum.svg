<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" width="160" height="120">
  <rect x="0" y="0" width="160" height="120" rx="8" ry="8" fill="#000" stroke="#444" stroke-width="1.5"/>
  <text x="80" y="14" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="9" font-weight="bold">Vacuum</text>
  <!-- Start/stop button -->
  <rect x="28" y="24" width="44" height="32" rx="6" fill="#22c55e" opacity="0.15"/>
  <line x1="50" y1="32" x2="50" y2="39" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  <path d="M43,34 A9.9,9.9 0 1 0 57,34" fill="none" stroke="#22c55e" stroke-width="2.5" stroke-linecap="round"/>
  <!-- Return-to-dock button -->
  <rect x="88" y="24" width="44" height="32" rx="6" fill="rgba(255,255,255,0.06)"/>
  <g transform="translate(110,42)">
    <polygon points="-12,0 0,-10 12,0" fill="none" stroke="#aaa" stroke-width="2" opacity="0.7"/>
    <rect x="-9" y="0" width="18" height="10" rx="1" fill="#aaa" opacity="0.5"/>
    <rect x="-3" y="4" width="6" height="6" rx="1" fill="#000"/>
  </g>
  <!-- Fan speed bars -->
  <g transform="translate(80,72)">
    <text x="0" y="0" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="6">Fan Speed</text>
    <rect x="-45" y="5" width="18" height="5" rx="2.5" fill="#3b82f6" opacity="0.6"/>
    <rect x="-23" y="5" width="18" height="5" rx="2.5" fill="#3b82f6" opacity="0.6"/>
    <rect x="-1" y="5" width="18" height="5" rx="2.5" fill="#3b82f6" opacity="0.4"/>
    <rect x="21" y="5" width="18" height="5" rx="2.5" fill="#333"/>
    <rect x="43" y="5" width="18" height="5" rx="2.5" fill="#333"/>
  </g>
  <text x="80" y="94" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="7">Roborock S7</text>
  <rect x="50" y="100" width="60" height="13" rx="6.5" fill="#22c55e" opacity="0.2"/>
  <text x="80" y="109" text-anchor="middle" fill="#22c55e" font-family="sans-serif" font-size="7">Cleaning</text>
</svg>
