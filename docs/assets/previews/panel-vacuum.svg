<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" width="160" height="120">
  <rect x="0" y="0" width="160" height="120" rx="8" ry="8" fill="#000"/>
  <!-- Title -->
  <text x="80" y="12" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="7" font-weight="bold">Robot Vacuum</text>
  <!-- 4 action buttons, evenly spaced -->
  <!-- Fan -->
  <rect x="12" y="22" width="30" height="30" rx="6" fill="rgba(255,255,255,0.06)"/>
  <circle cx="27" cy="37" r="7" fill="none" stroke="#888" stroke-width="1.5"/>
  <line x1="27" y1="30" x2="27" y2="32" stroke="#888" stroke-width="1.5"/>
  <text x="27" y="62" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="5">Fan</text>
  <!-- Start -->
  <rect x="49" y="22" width="30" height="30" rx="6" fill="#3b82f6" opacity="0.15"/>
  <polygon points="61,27 61,47 74,37" fill="#3b82f6"/>
  <text x="64" y="62" text-anchor="middle" fill="#3b82f6" font-family="sans-serif" font-size="5" font-weight="bold">Start</text>
  <!-- Home -->
  <rect x="86" y="22" width="30" height="30" rx="6" fill="rgba(255,255,255,0.06)"/>
  <polygon points="101,26 95,37 107,37" fill="#888"/>
  <rect x="99" y="37" width="4" height="6" fill="#888"/>
  <text x="101" y="62" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="5">Home</text>
  <!-- Find -->
  <rect x="123" y="22" width="30" height="30" rx="6" fill="rgba(255,255,255,0.06)"/>
  <circle cx="138" cy="37" r="6" fill="none" stroke="#888" stroke-width="1.5"/>
  <circle cx="138" cy="37" r="2" fill="#888"/>
  <text x="138" y="62" text-anchor="middle" fill="#888" font-family="sans-serif" font-size="5">Find</text>
  <!-- Status bar -->
  <rect x="6" y="72" width="148" height="16" rx="4" fill="#222"/>
  <text x="80" y="84" text-anchor="middle" fill="#3b82f6" font-family="sans-serif" font-size="7" font-weight="bold">Cleaning</text>
  <!-- 6 entity buttons -->
  <rect x="10" y="96" width="18" height="18" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="34" y="96" width="18" height="18" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="58" y="96" width="18" height="18" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="82" y="96" width="18" height="18" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="106" y="96" width="18" height="18" rx="3" fill="rgba(255,255,255,0.06)"/>
  <rect x="130" y="96" width="18" height="18" rx="3" fill="rgba(255,255,255,0.06)"/>
</svg>
