<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 160 120" width="160" height="120">
  <rect x="0" y="0" width="160" height="120" rx="8" ry="8" fill="#1a1a2e" stroke="#444" stroke-width="1.5"/>
  <text x="80" y="14" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="9" font-weight="bold">Weather</text>
  <!-- Sun + cloud -->
  <g transform="translate(20,-6) scale(0.75)">
    <circle cx="65" cy="55" r="10" fill="#f59e0b" opacity="0.8"/>
    <line x1="65" y1="39" x2="65" y2="35" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <line x1="65" y1="71" x2="65" y2="75" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <line x1="49" y1="55" x2="45" y2="55" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <line x1="81" y1="55" x2="85" y2="55" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <line x1="54" y1="44" x2="51" y2="41" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <line x1="76" y1="66" x2="79" y2="69" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <line x1="54" y1="66" x2="51" y2="69" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <line x1="76" y1="44" x2="79" y2="41" stroke="#f59e0b" stroke-width="1.5" opacity="0.6"/>
    <ellipse cx="80" cy="62" rx="18" ry="10" fill="#aaa" opacity="0.4"/>
    <ellipse cx="90" cy="58" rx="12" ry="8" fill="#aaa" opacity="0.35"/>
    <ellipse cx="73" cy="60" rx="10" ry="7" fill="#aaa" opacity="0.3"/>
  </g>
  <!-- Temperature -->
  <text x="80" y="66" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="16" font-weight="bold">24°C</text>
  <text x="80" y="77" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="6">Partly Cloudy</text>
  <!-- Forecast row -->
  <g transform="translate(80,88)">
    <circle cx="-45" cy="0" r="4" fill="#f59e0b" opacity="0.6"/>
    <circle cx="-15" cy="0" r="4" fill="#f59e0b" opacity="0.5"/>
    <circle cx="15" cy="0" r="4" fill="#aaa" opacity="0.3"/>
    <circle cx="45" cy="0" r="4" fill="#aaa" opacity="0.2"/>
    <text x="-45" y="11" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="6">25°</text>
    <text x="-15" y="11" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="6">22°</text>
    <text x="15" y="11" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="6">19°</text>
    <text x="45" y="11" text-anchor="middle" fill="#aaa" font-family="sans-serif" font-size="6">18°</text>
  </g>
  <!-- Details row -->
  <g transform="translate(80,104)">
    <rect x="-60" y="0" width="55" height="13" rx="3" fill="#222"/>
    <text x="-32" y="9" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="6">Humidity 56%</text>
    <rect x="5" y="0" width="55" height="13" rx="3" fill="#222"/>
    <text x="32" y="9" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="6">Wind 12 km/h</text>
  </g>
</svg>
