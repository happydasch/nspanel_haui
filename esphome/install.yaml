# Config Variables
substitutions:

  # Heartbeat interval in seconds
  heartbeat_interval: '5'
  # Friendly name of the device
  friendly_name: 'NSPanel HAUI'
  # Name of the device (used as ESPHome device name and hostname)
  name: nspanel-haui  # this name is also used for hostname


  # Accounts and Passwords
  ota_password: !secret ota_password
  api_encryption_key: !secret api_encryption_key
  web_username: !secret web_username
  web_password: !secret web_password
  wifi_ssid: !secret wifi_ssid
  wifi_password: !secret wifi_password
  ap_password: !secret ap_password

  # Custom Update Url
  tft_update_url: https://github.com/happydasch/nspanel_haui/raw/master/esphome/nspanel_haui.tft

packages:
  remote_package:
    url: https://github.com/happydasch/nspanel_haui
    ref: master
    files:
      - esphome/nspanel_haui.yaml
