# Display
display:

  - platform: nextion
    uart_id: haui_uart
    id: haui_disp
    wake_up_page: 0
    # Cap queue entries to prevent heap fragmentation from accumulated
    # commands when Nextion serial buffer overflows orphan pending entries.
    # 800 entries = enough to absorb a full panel config+render burst
    # plus concurrent state updates without drops.
    max_queue_size: 800
    # Limit commands processed per loop iteration to spread out
    # allocation/deallocation and reduce heap fragmentation.
    # Note: with command_spacing > 0 the pacer caps at 1 cmd/loop,
    # so only activate command_spacing to throttle cmd rate.
    max_commands_per_loop: 50
    # Minimum gap between commands sent to the Nextion display.  With spacing
    # enabled, the ESPHome Nextion component sends at most 1 command per loop
    # iteration (send_command_() uses App.get_loop_component_start_time() as
    # the timestamp, which is constant within a single loop iteration, so the
    # pacer check fails after the first send).  The loop typically runs at
    # 3-5ms on ESP32 for this workload, yielding ~200-330 commands/sec.
    # The 1KB Nextion RX buffer can hold ~78 comemands.
    # Set to e.g. 2ms to throttle to 1 cmd/loop and prevent UART overflow;
    # disabled by default for maximum throughput. uncomment and adjust as
    # needed based on observed overflow events and command rates.
    #
    #command_spacing: 2s
    # default url
    tft_url: $tft_update_url

    on_setup:
      then:
        # Restore brightness on display
        - number.set:
            id: brightness_full
            value: !lambda return int(id(brightness_full).state);
        # Restore dimmed brightness on display
        - number.set:
            id: brightness_dim
            value: !lambda return int(id(brightness_dim).state);
        # Initialize display backlight and brightness sensor to break
        # the NAN-guard deadlock in check_display
        - script.execute:
            id: set_brightness
            intensity: !lambda return int(id(brightness_full).state);
        # set as initialized
        - lambda: |-
              ESP_LOGI("haui", "NSPanel HAUI Init");
              id(haui_init) = true;

    on_page:
      then:
        - lambda: |-
            ESP_LOGD("haui", "Display page: %d", x);
            id(page).publish_state(x);

    on_touch:
      then:
        - lambda: |-
            std::string event = std::to_string(page_id) + "," + std::to_string(component_id);
            event += "," + std::to_string(touch_event);
            id(publish_event_native).execute("esphome.component", event);
            if (touch_event == 1) {
              id(publish_event_native).execute("esphome.touch_start", "1");
            }
            id(update_last_interaction).execute(-1, 0);

    on_buffer_overflow:
      then:
        - lambda: |-
            ESP_LOGW("haui", "Nextion buffer overflow detected");
            id(publish_event_native).execute("esphome.buffer_overflow", "1");
            id(update_last_interaction).execute(-1, 0);

    on_sleep:
      then:
        - lambda: |-
            ESP_LOGW("haui", "Display sleep on_sleep");

    on_wake:
      then:
        - lambda: |-
            ESP_LOGW("haui", "Display wakeup on_wake");
