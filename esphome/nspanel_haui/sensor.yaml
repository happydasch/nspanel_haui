---

# Binary Sensor Configuration
binary_sensor:

  # Touch state
  - platform: template
    name: Touch
    id: touch
    internal: false
    entity_category: diagnostic

  #  Physical hardware button below display to toggle relay
  - platform: gpio
    name: Button Left
    id: button_left
    pin:
      number: 14
      inverted: true
    on_press:
      then:
        - lambda: |-
            id(publish_event_native).execute("esphome.button_left", "1");
            if (id(use_button_interaction).state) {
              id(update_last_interaction).execute(-1, 0);
            }

    on_release:
      then:
        - lambda: |-
            id(publish_event_native).execute("esphome.button_left", "0");
    on_click:
      if:
        condition:
        - switch.is_on: use_relay_left
        then:
        - switch.toggle: relay_left


  # Physical hardware button below display to toggle relay
  - platform: gpio
    name: Button Right
    id: button_right
    pin:
      number: 27
      inverted: true
    on_press:
      then:
        - lambda: |-
            id(publish_event_native).execute("esphome.button_right", "1");
            if (id(use_button_interaction).state) {
              id(update_last_interaction).execute(-1, 0);
            }
    on_release:
      then:
        - lambda: |-
            id(publish_event_native).execute("esphome.button_right", "0");
    on_click:
      if:
        condition:
        - switch.is_on: use_relay_right
        then:
        - switch.toggle: relay_right


# Text Sensor Configuration
text_sensor:

  # TFT Version
  - platform: nextion
    nextion_id: haui_disp
    name: TFT Version
    id: tft_version
    update_interval: never
    component_name: system.tftVersion
    internal: true

  # Number request component
  - platform: template
    name: Request number component
    id: req_val_component
    update_interval: never
    internal: true

  # Text request component
  - platform: template
    name: Request text component
    id: req_txt_component
    update_interval: never
    internal: true

  # Response text
  - platform: nextion
    nextion_id: haui_disp
    name: Response Text
    id: res_txt
    update_interval: never
    component_name: system.resTxt
    internal: true
    on_value:
      - lambda: |-
          if (id(req_txt_component).state != "") {
            auto name = id(req_txt_component).state;
            const json::json_build_t payload = [name, x](JsonObject root) {
              root["name"] = name;
              root["value"] = x;
            };
            auto payload_str = build_json(payload);
            id(publish_event_native).execute("esphome.res_txt", payload_str);
          }

  # Wifi informations
  - platform: wifi_info
    ip_address:
      name: IP
      disabled_by_default: true
      id: ip_address
    ssid:
      name: SSID
      disabled_by_default: true
    bssid:
      name: BSSID
      disabled_by_default: true

  # Client Status (ESPHome)
  # Server status (hub_availability) is now set via native API
  # on_client_connected / on_client_disconnected triggers
  - platform: template
    name: Client Status
    id: client_status
    entity_category: diagnostic
    update_interval: never
    internal: false


# Sensor Configuration
sensor:

  # Response number
  - platform: nextion
    nextion_id: haui_disp
    name: Response Number
    id: res_val
    component_name: system.resVal
    update_interval: never
    accuracy_decimals: 0
    internal: true
    on_value:
      - lambda: |-
          if (id(req_val_component).state != "") {
            auto name = id(req_val_component).state;
            const json::json_build_t payload = [name, x](JsonObject root) {
              root["name"] = name;
              root["value"] = x;
            };
            auto payload_str = build_json(payload);
            id(publish_event_native).execute("esphome.res_val", payload_str);
          }
  # Current page
  # this sensor will get updated when a page change event occured
  - platform: template
    name: Page
    id: page
    internal: true
    accuracy_decimals: 0
    update_interval: never
    on_value:
      then:
        - lambda: |-
            id(publish_event_native).execute("esphome.page", std::to_string((uint8_t)x));

  # Touch X coordinates
  - platform: nextion
    nextion_id: haui_disp
    name: "Touch X"
    id: touch_x
    variable_name: tch0
    update_interval: never
    accuracy_decimals: 0
    internal: true
    filters:
      # Allow to pass the value only if the value changed
      - lambda: |-
          // make sure to compare numbers
          if (id(touch_x).state != x) {
            id(update_last_interaction).execute(-1, 0);
            return x;
          } else {
            return {};
          }

  # Touch Y coordinates
  - platform: nextion
    nextion_id: haui_disp
    name: "Touch Y"
    id: touch_y
    variable_name: tch1
    update_interval: never
    accuracy_decimals: 0
    internal: true
    filters:
      # Allow to pass the value only if the value changed
      - lambda: |-
          // make sure to compare numbers
          if (int(id(touch_y).state) != int(x)) {
            id(update_last_interaction).execute(-1, 0);
            return x;
          } else {
            return {};
          }

  # Brightness of display (tracks last-set value; avoids get-dim collision)
  - platform: template
    id: brightness
    name: Brightness
    internal: false
    accuracy_decimals: 0
    update_interval: never

  # Last Interaction
  - platform: template
    name: Last Interaction
    id: last_interaction
    update_interval: never
    accuracy_decimals: 0
    internal: true  # don't expose too much updates
    on_value:
        - lambda: |-
            id(update_last_interaction).execute(x, 0);

  # WIFI Signal stregth
  - platform: wifi_signal
    name: RSSI
    update_interval: 60s

  # Internal temperature sensor, ADC value
  - platform: adc
    name: ADC
    id: ntc_source
    pin: 38
    update_interval: 60s
    attenuation: 12db
    entity_category: diagnostic
    disabled_by_default: true

  # Internal temperature sensor
  # ADC reading converted to resistance (calculation)
  - platform: resistance
    name: Resistance
    id: resistance_sensor
    sensor: ntc_source
    entity_category: diagnostic
    configuration: DOWNSTREAM
    resistor: 11.2kOhm
    disabled_by_default: true

  # Internal temperature sensor
  # resistance to temperature (calculation)
  - platform: ntc
    name: Temperature
    id: temperature
    sensor: resistance_sensor
    calibration:
      b_constant: 3950
      reference_temperature: 25°C
      reference_resistance: 10kOhm
    filters:
      # add offset to value
      - lambda: return x + id(temperature_correction).state;
