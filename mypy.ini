[mypy]
mypy_path = apps/nspanel_haui
explicit_package_bases = True
namespace_packages = True
# Check haui package only; the entrypoint nspanel_haui.py imports "haui.*" which
# only resolves via mypy_path — when run standalone it would conflict with the
# file-system package path "apps.nspanel_haui.nspanel_haui".
files = apps/nspanel_haui/haui

# Third-party libs without stubs
[mypy-babel.*]
ignore_missing_imports = True

[mypy-dateutil.*]
ignore_missing_imports = True
